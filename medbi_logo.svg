<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <!-- Background -->
  <rect width="520" height="200" fill="#f0ede8"/>

  <!-- Shield outline -->
  <path d="M30 30 L140 30 Q155 30 155 45 L155 120 Q155 155 85 175 Q15 155 15 120 L15 45 Q15 30 30 30 Z"
        fill="#f0ede8" stroke="#3a9090" stroke-width="7"/>

  <!-- Cross inside shield -->
  <rect x="55" y="65" width="60" height="18" rx="3" fill="#3a8a50"/>
  <rect x="76" y="44" width="18" height="60" rx="3" fill="#3a8a50"/>

  <!-- Caduceus staff -->
  <line x1="85" y1="42" x2="85" y2="145" stroke="#3a9090" stroke-width="4" stroke-linecap="round"/>
  <!-- Top orb -->
  <circle cx="85" cy="40" r="5" fill="#3a9090"/>

  <!-- Snake 1 (left wrap) -->
  <path d="M85 60 C68 70 68 85 85 90 C102 95 102 110 85 118 C72 124 68 132 75 140"
        fill="none" stroke="#3a9090" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Snake 2 (right wrap) -->
  <path d="M85 60 C102 70 102 85 85 90 C68 95 68 110 85 118 C98 124 102 132 95 140"
        fill="none" stroke="#3a9090" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Snake head left -->
  <ellipse cx="74" cy="143" rx="5" ry="3.5" fill="#3a9090" transform="rotate(-20 74 143)"/>
  <!-- Snake head right -->
  <ellipse cx="96" cy="143" rx="5" ry="3.5" fill="#3a9090" transform="rotate(20 96 143)"/>

  <!-- MEDBI text -->
  <text x="180" y="135" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="78" fill="#3a9090" letter-spacing="2">MEDBI</text>
</svg>
